<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - Research Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #F3F4F6;
        }
    </style>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden p-8">
        <div class="text-center mb-6">
            <div
                class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full mx-auto flex items-center justify-center text-2xl mb-4">
                <i class="fa-solid fa-key"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">ลืมรหัสผ่าน?</h2>
            <p class="text-gray-500 text-sm mt-2">กรอกอีเมลที่คุณใช้ลงทะเบียน เราจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ให้คุณ
            </p>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">อีเมล (Email)</label>
                <input type="email" name="email"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"
                    placeholder="name@example.com" required>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition">
                ส่งลิงก์รีเซ็ตรหัสผ่าน
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="login.html"
                class="text-sm text-gray-500 hover:text-gray-800 bg-gray-100 px-4 py-2 rounded-full transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> กลับหน้าเข้าสู่ระบบ
            </a>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังส่ง...';
            btn.disabled = true;

            const formData = new FormData(this);

            try {
                const response = await fetch('api/send_reset_link.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.status === 'success') {
                    alert('ส่งลิงก์รีเซ็ตรหัสผ่านเรียบร้อยแล้ว! กรุณาตรวจสอบอีเมลของคุณ');
                    window.location.href = 'login.html';
                } else {
                    alert('เกิดข้อผิดพลาด: ' + result.message);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
